<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content"width=device-width, initial-scale="1.0">
        <title>Classic Car Slideshow</title>
        <link rel="stylesheet" href="CSS/main.css">
    </head>
    <body>
        <h1>Classic Car Slideshow</h1>
        <p> A collection of classic cars.</p>
        <p> How many seconds would you like to set your countdown for?</p>
        <input id="seconds" value="">
        <button onclick="countdown()">Click Here</button>
        <p id="timer"></p>
        <div class="slideshow-container">
            <div class="mySlides fade">
                <div class="number-text">1 / 3</div>
                <img src="Images/car1.jpg" alt="classic car one picture">
                <div class="caption-text">
                    Classic Car One
                </div>   
            </div>
            <div class="mySlides fade">
                <div class="number-text">2 / 3</div>
                <img src="Images/car2.jpg" alt="Classic car two picture">
                <div class="caption-text">
                    Classic Car Two
                </div>
            </div>
            <div class="mySlides fade">
                <div class="number-text">3 / 3</div>
                <img src="Images/car3.jpg" alt="Classic car three">
                <div class="caption-text">
                    Classic Car Three
                </div>
            </div>
            <a class="previous" onclick="changeSlides(-1)">&#10094;</a>
            <a class="next" onclick="changeSlides(1)">&#10095;</a>
        </div>
        <div class="dot-container">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>
        <script src="main.js"></script>
    </body>
</html>
